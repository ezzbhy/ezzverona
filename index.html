<script>

    e.preventDefault();

});

// ── LOCAL STORAGE HELPERS (للإعدادات الشخصية فقط) ──────────────────
const LS = {
    get(key, fallback) { try { const v = localStorage.getItem("verona_" + key); return v ? JSON.parse(v) : fallback; } catch (e) { return fallback; } },
    set(key, value) { try { localStorage.setItem("verona_" + key, JSON.stringify(value)); } catch (e) { console.warn(e); } }
};

// ── FIRESTORE HELPERS ──────────────────────────────────────
const getDB = () => window.__DB;
const FS = () => window.__FS;

async function fbGet(docPath) {
    try {
        const ref = FS().doc(getDB(), docPath);
        const snap = await FS().getDoc(ref);
        return snap.exists() ? snap.data() : null;
    } catch(e) { console.error("fbGet error", e); return null; }
}

async function fbSet(docPath, data) {
    try {
        const ref = FS().doc(getDB(), docPath);
        await FS().setDoc(ref, data);
    } catch(e) { console.error("fbSet error", e); }
}

function fbListen(docPath, cb) {
    const ref = FS().doc(getDB(), docPath);
    return FS().onSnapshot(ref, snap => cb(snap.exists() ? snap.data() : null));
}

function fbListenCol(colPath, cb, limitN = 500) {
    const ref = FS().collection(getDB(), colPath);
    const q = FS().query(ref, FS().orderBy("time", "desc"), FS().limit(limitN));
    return FS().onSnapshot(q, snap => cb(snap.docs.map(d => d.data())));
}

async function fbAddLog(entry) {
    try {
        const ref = FS().collection(getDB(), "logs");
        await FS().addDoc(ref, entry);
    } catch(e) { console.error("fbAddLog error", e); }
}

async function fbAddChat(msg) {
    try {
        const ref = FS().collection(getDB(), "chat");
        await FS().addDoc(ref, msg);
        return true;
    } catch(e) { console.error("fbAddChat error", e); return false; }
}

async function fbDeleteChat(id) {
    try {
        const col = FS().collection(getDB(), "chat");
        const snap = await FS().getDocs(col);
        snap.docs.forEach(async d => { if(d.data().id === id) await FS().deleteDoc(d.ref); });
    } catch(e) { console.error("fbDeleteChat error", e); }
}

async function fbUpdateChat(id, patch) {
    try {
        const col = FS().collection(getDB(), "chat");
        const snap = await FS().getDocs(col);
        snap.docs.forEach(async d => { if(d.data().id === id) await FS().updateDoc(d.ref, patch); });
    } catch(e) { console.error("fbUpdateChat error", e); }
}

    } catch(e) { console.error("fbUpdateWorkerLog error", e); return false; }
}

async function fbAddResidentVisit(entry) {
    try {
        const ref = FS().collection(getDB(), "residentvisits");
        await FS().addDoc(ref, entry);
        return true;
    } catch(e) { console.error("fbAddResidentVisit error", e); return false; }
}

async function fbDeleteResidentVisit(id) {
    try {
        const ref = FS().collection(getDB(), "residentvisits");
        const snap = await FS().getDocs(ref);
        snap.docs.forEach(async d => { if(d.data().id === id) await FS().deleteDoc(d.ref); });
    } catch(e) { console.error("fbDeleteResidentVisit error", e); }
}

async function fbUpdateResidentVisit(id, patch) {
    try {
        const ref = FS().collection(getDB(), "residentvisits");
        const snap = await FS().getDocs(ref);
        snap.docs.forEach(async d => { if(d.data().id === id) await FS().updateDoc(d.ref, patch); });
    } catch(e) { console.error("fbUpdateResidentVisit error", e); }
}

// ── دالة تشفير كلمة المرور (SHA-256)
async function hashPassword(plain) {
    const enc = new TextEncoder().encode(plain);
    const buf = await crypto.subtle.digest("SHA-256", enc);
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,"0")).join("");
}
// ── للتحقق من كلمة المرور عند تسجيل الدخول
async function checkPassword(plain, hash) {
    return (await hashPassword(plain)) === hash;
}

body.day-mode select.fi option{background:#f0f4f8;color:#1a2a3a}
body{background:var(--bg);color:var(--txt);font-family:'Tajawal',sans-serif;direction:rtl;min-height:100vh;transition:background .4s,color .4s;overflow-x:hidden}
.app{display:flex;min-height:100vh;max-width:100vw;overflow-x:hidden}
.sb{width:252px;background:var(--s1);border-left:1px solid var(--bdr);display:flex;flex-direction:column;position:fixed;right:0;top:0;bottom:0;z-index:300;transition:transform .3s cubic-bezier(.4,0,.2,1)}
.sb-logo{padding:20px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:11px}
.sb-ico{width:44px;height:44px;border-radius:13px;background:linear-gradient(145deg,#0d1e38,#162d4a);border:1.5px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.sb-ttl{font-size:15px;font-weight:900;color:var(--gold2)}
.sb-sub{font-size:11px;color:var(--txt3)}
.sb-user{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:9px}
.sb-av{width:34px;height:34px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#1a6bbd);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px;color:#fff;flex-shrink:0}
.sb-un{font-size:13px;font-weight:700}
.sb-ur{font-size:11px;color:var(--txt3)}
.sb-nav{flex:1;padding:8px;overflow-y:auto}
.ni{display:flex;align-items:center;gap:9px;padding:10px 11px;border-radius:var(--rs);color:var(--txt2);cursor:pointer;font-size:14px;font-weight:500;margin-bottom:1px;transition:all .15s;position:relative}
.ni:hover{background:var(--s2);color:var(--txt)}
.ni.on{background:rgba(59,158,255,.1);color:#5fb3ff}
.ni.on::before{content:'';position:absolute;right:0;top:22%;bottom:22%;width:3px;background:var(--blue);border-radius:3px 0 0 3px}
.nb{margin-right:auto;background:var(--red);color:#fff;font-size:11px;font-weight:800;padding:1px 7px;border-radius:20px}
.sb-ft{padding:12px;border-top:1px solid var(--bdr)}
.sb-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:200}
.main{flex:1;margin-right:252px;display:flex;flex-direction:column;min-height:100vh}
.topbar{height:58px;padding:0 10px;background:var(--s1);border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;overflow:hidden}
.tb-left{display:flex;align-items:center;gap:8px;min-width:0;flex:1}
.tb-title{font-size:15px;font-weight:800;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tb-right{display:flex;align-items:center;gap:6px;flex:none}
.live{display:flex;align-items:center;gap:6px;background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:20px;padding:4px 10px;font-size:12px;font-weight:600;color:var(--green)}
.ld{width:7px;height:7px;border-radius:50%;background:var(--green);animation:pls 2s infinite;display:inline-block}
@keyframes pls{0%,100%{box-shadow:0 0 0 0 rgba(16,185,129,.5)}50%{box-shadow:0 0 0 5px rgba(16,185,129,0)}}
.clk{font-size:12px;color:var(--txt2);font-variant-numeric:tabular-nums}
.cnt{padding:24px 26px;flex:1}
.hbtn{display:none;background:transparent;border:1px solid var(--bdr);border-radius:var(--rs);padding:7px 9px;cursor:pointer;color:var(--txt2);font-size:18px;line-height:1}
@media(max-width:768px){
  .sb{transform:translateX(100%)}
  .sb.open{transform:translateX(0)}
  .sb-backdrop.open{display:block}
  .main{margin-right:0;width:100%;max-width:100vw;overflow-x:hidden}
  .hbtn{display:flex;align-items:center;justify-content:center}
  .cnt{padding:10px;max-width:100vw;overflow-x:hidden}
  .g2{grid-template-columns:1fr!important}
  .g3{grid-template-columns:1fr 1fr!important}
  .sg{grid-template-columns:repeat(2,1fr)}
  .clk{display:none}
  table th:nth-child(n+5),table td:nth-child(n+5){display:none}
  .topbar{padding:0 8px}
  .tb-title{font-size:14px;max-width:80px}
  .live{padding:3px 7px;font-size:11px;gap:4px}
  .live span:last-child{display:none}
}
.card{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:20px;margin-bottom:16px}
.ch{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.ct{font-size:15px;font-weight:700}
.sg{display:grid;grid-template-columns:repeat(auto-fill,minmax(155px,1fr));gap:12px;margin-bottom:18px}
.sc{background:var(--s1);border:1px solid var(--bdr);border-radius:var(--r);padding:16px;transition:transform .2s,border-color .2s}
.sc:hover{transform:translateY(-2px);border-color:var(--bdr2)}
.si{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;margin-bottom:10px;font-size:18px}
.sv{font-size:28px;font-weight:900;margin-bottom:3px}
.sl{font-size:12px;color:var(--txt3);font-weight:600}
.tw{overflow-x:auto}
.staff-cards{display:flex;flex-direction:column;gap:10px;padding:4px 0}
.staff-card{display:flex;align-items:center;gap:12px;padding:12px 14px;background:var(--s2);border-radius:var(--rs);border:1px solid var(--bdr);position:relative}
.staff-card-avatar{width:44px;height:44px;border-radius:50%;object-fit:cover;border:2px solid var(--bdr2);flex-shrink:0}
.staff-card-info{flex:1;min-width:0}
.staff-card-name{font-weight:700;font-size:15px;margin-bottom:3px}
.staff-card-phone{font-size:12px;color:var(--txt2);font-family:monospace}
.staff-card-badges{display:flex;gap:5px;margin-top:4px;flex-wrap:wrap}
.staff-menu-btn{background:none;border:none;cursor:pointer;color:var(--txt2);font-size:22px;padding:4px 8px;line-height:1;border-radius:8px;flex-shrink:0}
.staff-menu-btn:hover{background:var(--s3,rgba(255,255,255,.06))}
.staff-dropdown{position:absolute;left:10px;top:50px;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rs);box-shadow:0 8px 24px rgba(0,0,0,.4);z-index:100;min-width:170px;overflow:hidden}
.staff-dropdown button{display:flex;align-items:center;gap:10px;width:100%;padding:11px 16px;background:none;border:none;cursor:pointer;color:var(--txt);font-size:14px;font-family:Tajawal,sans-serif;text-align:right;transition:background .15s}
.staff-dropdown button:hover{background:rgba(59,158,255,.08)}
.staff-dropdown button.danger{color:#ef4444}
.staff-dropdown button.danger:hover{background:rgba(239,68,68,.08)}
.staff-dropdown-sep{height:1px;background:var(--bdr);margin:3px 0}
table{width:100%;border-collapse:collapse}
th{padding:10px 13px;text-align:right;font-size:11px;font-weight:800;color:var(--txt3);background:var(--s2);border-bottom:1px solid var(--bdr);white-space:nowrap}
td{padding:12px 13px;font-size:14px;border-bottom:1px solid rgba(80,160,255,.04);vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(59,158,255,.025)}
.fg{margin-bottom:14px}
.fl{display:block;font-size:11px;font-weight:800;color:var(--txt2);margin-bottom:6px;text-transform:uppercase;letter-spacing:.4px}
.fi{width:100%;padding:10px 13px;background:var(--s2);border:1px solid var(--bdr);border-radius:var(--rs);color:var(--txt);font-family:'Tajawal',sans-serif;font-size:14px;outline:none;transition:border-color .2s}
.fi:focus{border-color:var(--blue)}
.fi::placeholder{color:var(--txt3)}
select.fi option{background:#162030}
textarea.fi{resize:vertical;min-height:72px} textarea.chat-text-input{min-height:38px;resize:none}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;padding:9px 18px;border-radius:var(--rs);font-family:'Tajawal',sans-serif;font-size:14px;font-weight:700;cursor:pointer;border:none;transition:all .17s;white-space:nowrap}
.bb{background:linear-gradient(135deg,#1a6fcc,#2a8ae0);color:#fff;box-shadow:0 3px 12px rgba(59,158,255,.22)}
.bb:hover{transform:translateY(-1px)}
.bg2{background:linear-gradient(135deg,#9a7420,#d4a843);color:#1a0e00;box-shadow:0 3px 12px rgba(212,168,67,.18)}
.bg2:hover{transform:translateY(-1px)}
.bgh{background:transparent;color:var(--txt2);border:1px solid var(--bdr)}
.bgh:hover{border-color:var(--bdr2);color:var(--txt);background:var(--s2)}
.br{background:rgba(239,68,68,.12);color:var(--red);border:1px solid rgba(239,68,68,.2)}
.br:hover{background:rgba(239,68,68,.22)}
.bgr{background:rgba(16,185,129,.12);color:var(--green);border:1px solid rgba(16,185,129,.2)}
.bgr:hover{background:rgba(16,185,129,.22)}
.bsm{padding:6px 12px;font-size:13px}
.bxs{padding:4px 9px;font-size:12px}
.bfw{width:100%}
.btn:disabled{opacity:.4;cursor:not-allowed;transform:none!important}
.bdg{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:12px;font-weight:700}
.ov{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:500;display:flex;align-items:center;justify-content:center;padding:20px;animation:fdi .2s}
@keyframes fdi{from{opacity:0}to{opacity:1}}
.modal{background:var(--s1);border:1px solid var(--bdr2);border-radius:18px;padding:28px;width:100%;max-width:520px;max-height:90vh;overflow-y:auto;animation:sci .22s;box-shadow:0 30px 70px rgba(0,0,0,.6)}
.modal-lg{max-width:680px}
@keyframes sci{from{opacity:0;transform:scale(.96)}to{opacity:1;transform:scale(1)}}
.mt{font-size:18px;font-weight:900;color:var(--gold2);margin-bottom:20px}
.mf{display:flex;gap:9px;margin-top:20px}
.tabs{display:flex;gap:3px;background:var(--s2);padding:3px;border-radius:var(--rs);width:fit-content;margin-bottom:20px;flex-wrap:wrap}
.tab{padding:8px 16px;border-radius:6px;font-size:14px;font-weight:700;cursor:pointer;color:var(--txt3);transition:all .15s}
.tab.on{background:var(--s1);color:var(--txt);box-shadow:0 2px 8px rgba(0,0,0,.3)}
.div{height:1px;background:var(--bdr);margin:16px 0}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:14px}
.err{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.25);color:#fca5a5;padding:9px 13px;border-radius:var(--rs);font-size:13px;margin-bottom:12px;display:flex;align-items:center;gap:7px}
.warn-box{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.25);color:#fcd34d;padding:9px 13px;border-radius:var(--rs);font-size:13px;margin-bottom:10px}
.empty{text-align:center;padding:44px 0;color:var(--txt3);font-size:15px}
.ph{margin-bottom:20px;display:flex;align-items:flex-start;justify-content:space-between;flex-wrap:wrap;gap:10px}
.ph-l .pt{font-size:21px;font-weight:900}
.ph-l .ps{font-size:13px;color:var(--txt3);margin-top:2px}
.sr{position:relative}
.sr .fi{padding-right:38px}
.sri{position:absolute;right:12px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none;font-size:16px}
.bov{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:14px;margin-bottom:18px}
.bov-card{background:var(--s2);border:1px solid var(--bdr);border-radius:var(--r);padding:16px}
.bov-name{font-size:14px;font-weight:800;margin-bottom:10px;color:var(--gold2)}
.bov-bar-bg{height:8px;background:var(--s3);border-radius:4px;overflow:hidden;margin-bottom:6px}
.bov-bar{height:100%;background:linear-gradient(90deg,var(--blue),var(--green));border-radius:4px;transition:width .4s}
.bov-nums{font-size:12px;color:var(--txt3);display:flex;justify-content:space-between}
.hist-item{padding:10px 0;border-bottom:1px solid var(--bdr);display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap}
.hist-item:last-child{border-bottom:none}
.tc{position:fixed;bottom:18px;left:18px;z-index:999;display:flex;flex-direction:column;gap:7px}
.tst{background:var(--s3);border:1px solid var(--bdr2);border-radius:var(--rs);padding:12px 16px;display:flex;align-items:center;gap:9px;font-size:14px;font-weight:600;box-shadow:0 8px 28px rgba(0,0,0,.4);animation:ta .3s;min-width:220px}
@keyframes ta{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.tok{border-color:rgba(16,185,129,.3)}
.terr{border-color:rgba(239,68,68,.3)}
.lbg{min-height:100vh;display:flex;align-items:center;justify-content:center;background:radial-gradient(ellipse at 25% 20%,rgba(59,158,255,.06),transparent 55%),radial-gradient(ellipse at 75% 80%,rgba(212,168,67,.05),transparent 55%),var(--bg)}
.lc{background:var(--s1);border:1px solid var(--bdr2);border-radius:22px;padding:44px;width:100%;max-width:390px;box-shadow:0 28px 60px rgba(0,0,0,.6);animation:fdu .5s}
@keyframes fdu{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.lic{width:84px;height:84px;border-radius:20px;display:block;margin:0 auto 14px;object-fit:contain}
.lt{text-align:center;font-size:20px;font-weight:900;color:var(--gold2)}
.ls{text-align:center;font-size:13px;color:var(--txt3);margin-top:3px;margin-bottom:28px}
.demo{background:var(--s2);border-radius:var(--rs);padding:12px;font-size:12px;color:var(--txt3);margin-top:16px;line-height:1.9}
.demo strong{color:var(--txt2)}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--s4);border-radius:3px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
@keyframes prog{from{width:0}to{width:100%}}
/* CHAT */
.chat-wrap{display:flex;flex-direction:column;height:calc(100vh - 130px);max-height:700px}
.chat-msgs{flex:1;overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:8px}
.chat-bubble{max-width:75%;padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.6;position:relative;unicode-bidi:plaintext;text-align:right}
.chat-bubble.mine{align-self:flex-end;background:linear-gradient(135deg,#1a6fcc,#2a8ae0);color:#fff;border-bottom-left-radius:4px}
.chat-bubble.other{align-self:flex-start;background:var(--s2);border:1px solid var(--bdr);color:var(--txt);border-bottom-right-radius:4px}
.chat-meta{font-size:11px;opacity:.7;margin-top:4px}
.chat-input-row{display:flex;gap:8px;padding:12px;border-top:1px solid var(--bdr);background:var(--s1);border-radius:0 0 var(--r) var(--r);align-items:center}
.chat-img{max-width:220px;max-height:220px;border-radius:10px;display:block;cursor:pointer;margin-top:2px}
.chat-audio{margin-top:2px;max-width:220px}
.chat-icon-btn{background:transparent;border:1px solid var(--bdr);color:var(--txt2);border-radius:var(--rs);width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:18px;cursor:pointer;flex:none;transition:all .15s}
.chat-icon-btn:hover{border-color:var(--bdr2);color:var(--txt);background:var(--s2)}
.chat-icon-btn.rec{color:var(--red);border-color:rgba(239,68,68,.35);background:rgba(239,68,68,.08);animation:pulse 1.2s infinite}
.chat-text-input{flex:1 1 auto;min-width:0;width:auto;margin:0;resize:none;overflow:hidden;line-height:1.5;padding-top:8px;padding-bottom:8px;max-height:120px;overflow-y:auto}
.attach-menu{position:absolute;bottom:50px;right:0;background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rs);box-shadow:0 8px 24px rgba(0,0,0,.4);display:flex;flex-direction:column;min-width:140px;overflow:hidden;z-index:50}
.attach-menu button{display:flex;align-items:center;gap:8px;padding:10px 14px;background:transparent;border:none;color:var(--txt);font-family:'Tajawal',sans-serif;font-size:14px;cursor:pointer;text-align:right;width:100%}
.attach-menu button:hover{background:var(--s3)}
@media (max-width:480px){
  .chat-input-row{flex-wrap:nowrap;gap:6px;padding:8px}
  .chat-icon-btn{width:38px;height:38px;font-size:16px}
  .chat-input-row .btn{padding:0 12px;font-size:13px}
}
.img-lightbox{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:600;display:flex;align-items:center;justify-content:center;padding:20px}
.img-lightbox img{max-width:100%;max-height:100%;border-radius:8px}
.send-preview-modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:650;display:flex;align-items:flex-end;justify-content:center;padding:0}
.send-preview-box{background:var(--s1);border-radius:20px 20px 0 0;width:100%;max-width:520px;padding:20px;border-top:1px solid var(--bdr2);animation:slideUp .25s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.send-preview-box h3{font-size:15px;font-weight:800;margin-bottom:14px;color:var(--txt);text-align:center}
.preview-grid{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-height:300px;overflow-y:auto;margin-bottom:14px}
.preview-thumb{position:relative;width:90px;height:90px;border-radius:10px;overflow:hidden;border:2px solid var(--bdr2)}
.preview-thumb img{width:100%;height:100%;object-fit:cover}
.preview-thumb video{width:100%;height:100%;object-fit:cover}
.preview-thumb .rm-btn{position:absolute;top:3px;left:3px;background:rgba(0,0,0,.65);border:none;border-radius:50%;width:20px;height:20px;color:#fff;font-size:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1}
.preview-file-item{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--bdr);border-radius:10px;padding:8px 12px;margin-bottom:6px}
.preview-file-item .fi-icon{font-size:22px}
.preview-file-item .fi-name{font-size:13px;font-weight:600;color:var(--txt);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.preview-file-item .fi-size{font-size:11px;color:var(--txt3)}
.preview-caption{width:100%;background:var(--s2);border:1px solid var(--bdr2);border-radius:10px;padding:8px 12px;color:var(--txt);font-family:Tajawal,sans-serif;font-size:14px;margin-bottom:14px;resize:none;direction:rtl}
.preview-actions{display:flex;gap:10px}
.preview-actions .btn{flex:1;justify-content:center}
.print-header{display:none}
@media print{
  body *{visibility:hidden}
  #report-print-area,#report-print-area *{visibility:visible}
  #report-print-area{position:absolute;top:0;left:0;width:100%;padding:10px;direction:rtl}
  .no-print{display:none!important}
  .print-header{display:block;text-align:center;margin-bottom:16px}
  .print-header h1{font-size:20px;margin-bottom:4px}
  .print-header div{font-size:12px;color:#555}
  #report-print-area .card{border:1px solid #ccc;box-shadow:none;break-inside:avoid}
  #report-print-area th,#report-print-area td{color:#000!important;border-color:#ccc!important}
  #report-print-area .bdg,#report-print-area .si,#report-print-area .sc,#report-print-area .ct,#report-print-area .sv,#report-print-area .sl{color:#000!important}
}
/* NOTIF */
.notif-dot{position:absolute;top:6px;right:6px;width:8px;height:8px;border-radius:50%;background:var(--red);border:2px solid var(--s1)}
.notif-panel{position:fixed;top:64px;left:8px;right:8px;width:auto;max-width:320px;background:var(--s1);border:1px solid var(--bdr2);border-radius:var(--r);box-shadow:0 20px 60px rgba(0,0,0,.5);z-index:400;animation:sci .2s;max-height:420px;overflow-y:auto}
.notif-item{padding:12px 16px;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;gap:10px;cursor:pointer;transition:background .15s}
.notif-item:hover{background:var(--s2)}
.notif-item.unread{background:rgba(59,158,255,.04)}
.plate-search-bar{display:flex;align-items:center;gap:8px;background:rgba(59,158,255,.06);border:1px solid rgba(59,158,255,.18);border-radius:var(--r);padding:10px 14px;margin-bottom:10px}
.plate-search-bar input{flex:1;background:none;border:none;outline:none;color:var(--txt);font-family:Tajawal,sans-serif;font-size:15px;font-weight:700;letter-spacing:2px}
.plate-search-bar input::placeholder{color:var(--txt3);font-size:13px;letter-spacing:0;font-weight:400}
.plate-result{background:var(--s2);border:1px solid var(--bdr2);border-radius:var(--rs);padding:12px 14px;margin-bottom:8px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.plate-tag{background:rgba(59,158,255,.12);color:#5fb3ff;border:1px solid rgba(59,158,255,.25);border-radius:6px;padding:3px 10px;font-family:monospace;font-weight:800;font-size:14px;letter-spacing:1px}
.dup-alert{background:rgba(239,68,68,.1);border:2px solid rgba(239,68,68,.4);border-radius:var(--r);padding:14px 16px;margin-bottom:14px;animation:pulse-bdr 1.5s infinite}
